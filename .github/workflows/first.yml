name: First work
on: [push]

jobs:
  run-init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: init
        run: |
          npm i
  run-lint:
    runs-on: ubuntu-latest
    needs: [run-init]
    steps:
      - name: lint
        run: npm run lint
  run-test:
    runs-on: ubuntu-latest
    needs: [run-lint]
    steps:
      - name: test
        run: npm run test
  run-build:
    runs-on: ubuntu-latest
    needs: [run-test]
    steps:
      - name: build
        run: npm run build
