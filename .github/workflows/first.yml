name: First work
on: [push]

jobs:
  first:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache
        id: cache-step
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: "cache-file"
      - name: Display cache
        run: echo ${{steps.cache-step.outputs}}
      - name: Istall
        run: npm i
