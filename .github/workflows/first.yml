name: First work
on:
  push:
    paths:
      - "src/**"
    branches:
      - master

jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lint
        run: |
          npm i
          npm run lint
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: test
        run: |
          npm i
          npm run test
  run-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: |
          npm i
          npm run build
