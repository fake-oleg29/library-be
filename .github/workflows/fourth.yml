name: Fourth Workflow
on:
  workflow_run:
    workflows: [Third Workflow, Second Workflow]
    types:
      - completed

jobs:
  run-fourth-success-job:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Display Success text
        run: echo "Success"
  run-fourth-failure-job:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Display Failure text
        run: echo "Failure"
